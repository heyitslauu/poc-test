name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/${{ secrets.APP_NAME }}:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: Push Image
        run: docker push ${{ env.DOCKER_IMAGE }}

      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: compose.prod.yaml
          target: ~/app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE_CONTENT,DOCKER_IMAGE
          script: |
            cd ~/app

            # Clean up old container from previous bare docker run
            sudo docker stop ${{ secrets.APP_NAME }} 2>/dev/null || true
            sudo docker rm ${{ secrets.APP_NAME }} 2>/dev/null || true

            # Ensure logs directory exists with correct ownership (UID 1001 = exfsds in container)
            mkdir -p ~/app/logs
            sudo chown -R 1001:1001 ~/app/logs

            # Write env file and export image name
            echo "$ENV_FILE_CONTENT" > .env
            echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> .env

            sudo docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            sudo docker compose -f compose.prod.yaml pull
            sudo docker compose -f compose.prod.yaml up -d --force-recreate
            sudo docker image prune -f
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
