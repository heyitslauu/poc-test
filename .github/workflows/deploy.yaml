name: CI/CD - Build, Push to ECR, Deploy

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ASG_NAME: ${{ secrets.ASG_NAME }}

    steps:
      - uses: actions/checkout@v3

      # 1️⃣ Set environment variables based on branch
      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "ENV_TAG=prod-latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "ENV_TAG=dev-latest" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_TAG=staging-latest" >> $GITHUB_ENV
          fi

      # 2️⃣ Ensure ECR repository exists
      - name: Create ECR Repository if Not Exists
        run: |
          aws ecr describe-repositories \
            --repository-names $SERVICE_NAME \
            --region $AWS_REGION \
          || aws ecr create-repository \
            --repository-name $SERVICE_NAME \
            --region $AWS_REGION
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 3️⃣ Login to AWS ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login \
            --username AWS \
            --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 4️⃣ Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5️⃣ Build & Push Docker Image to ECR (with layer caching)
      - name: Build & Push Docker Image to ECR
        run: |
          IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE_NAME:$ENV_TAG

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t $IMAGE \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
        env:
          ENV_TAG: ${{ env.ENV_TAG }}

      # 6️⃣ Generate environment-specific docker-compose.yml
      - name: Generate docker-compose.yml
        run: |
          cat > docker-compose.yml <<EOL
          services:
            app:
              image: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE_NAME:$ENV_TAG
              container_name: $SERVICE_NAME-api
              ports:
                - "80:3000"
          EOL

      # 7️⃣ Generate .env from GitHub Secret
      - name: Generate .env from GitHub Secret
        run: echo "${{ env.CLEAN_ENV }}" > .env

        env:
          CLEAN_ENV: ${{ env.CLEAN_ENV }}

      # 8️⃣ Upload docker-compose.yml and .env to S3
      - name: Upload docker-compose.yml and .env to S3
        run: |
          S3_PATH="s3://s3-compose/${SERVICE_NAME}/${ENV_TAG}/docker-compose.yml"
          S3_ENV_PATH="s3://s3-compose/${SERVICE_NAME}/${ENV_TAG}/.env"

          echo "Uploading docker-compose.yml to $S3_PATH"
          echo "Uploading .env to $S3_ENV_PATH"

          aws s3 cp .env $S3_ENV_PATH --region $AWS_REGION
          aws s3 cp docker-compose.yml $S3_PATH --region $AWS_REGION
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 9️⃣ Trigger ASG Instance Refresh
      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --region $AWS_REGION
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
