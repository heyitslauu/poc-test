name: CI/CD - Build, Push to ECR, Deploy
on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ASG_NAME: ${{ secrets.ASG_NAME }}
    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Set environment variables based on branch
      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "ENV_TAG=prod-latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "ENV_TAG=dev-latest" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_TAG=staging-latest" >> $GITHUB_ENV
          fi

      # 3️⃣ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 4️⃣ Build & push Docker image (single step)
      - name: Build and Push Docker Image
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:${{ env.ENV_TAG }} \
            --push .
        env:
          ENV_TAG: ${{ env.ENV_TAG }}

      # 5️⃣ Generate environment-specific docker-compose.yml
      - name: Generate docker-compose.yml
        run: |
          cat > docker-compose.yml <<EOL
          services:
            app:
              image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:${{ env.ENV_TAG }}
              container_name: ${{ env.SERVICE_NAME }}-api
              ports:
                - "80:3000"
          EOL
        env:
          ENV_TAG: ${{ env.ENV_TAG }}

      # 6️⃣ Generate .env from GitHub Secret
      - name: Generate .env from GitHub Secret
        run: echo "${{ secrets.CLEAN_ENV }}" > .env

      # 7️⃣ Upload to S3
      - name: Upload docker-compose to S3
        run: |
          S3_PATH="s3://s3-compose/${SERVICE_NAME}/${ENV_TAG}/docker-compose.yml"
          S3_ENV_PATH="s3://s3-compose/${SERVICE_NAME}/${ENV_TAG}/.env"

          echo "Uploading docker-compose.yml to $S3_PATH"
          echo "Uploading .env to $S3_ENV_PATH"

          aws s3 cp .env $S3_ENV_PATH --region $AWS_REGION
          aws s3 cp docker-compose.yml $S3_PATH --region $AWS_REGION
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          ENV_TAG: ${{ env.ENV_TAG }}

      # 8️⃣ Trigger ASG Instance Refresh
      - name: Trigger Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --region ${{ env.AWS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ASG_NAME: ${{ secrets.ASG_NAME }}
