name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }} # Add this to your repository secrets (e.g., "my-service")
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }} # Add this to your repository secrets
      AWS_REGION: ${{ secrets.AWS_REGION }} # Add this to your repository secrets
    steps:
      - uses: actions/checkout@v3

      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "ENV_TAG=prod-latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "ENV_TAG=dev-latest" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_ENV
            echo "ENV_TAG=staging-latest" >> $GITHUB_ENV
          fi

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login \
            --username AWS \
            --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build Docker Image
        run: |
          IMAGE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:${{ env.ENV_TAG }}

          echo "Building Docker image:"
          echo "$IMAGE"
          echo "SERVICE_NAME=$SERVICE_NAME"
          echo "AWS_REGION=$AWS_REGION"
          echo "ENV_TAG=$ENV_TAG"

          docker build -t $IMAGE .

        env:
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ENV_TAG: ${{ env.ENV_TAG }}

      - name: Push Image
        run: docker push ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE_NAME }}:${{ env.ENV_TAG }}
