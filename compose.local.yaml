services:
  empowerx-fsds-db-local:
    image: postgres:18-alpine
    container_name: empowerx-fsds-db-local
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - empowerx-fsds-db-data-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "15432:5432"
    networks:
      - empowerx-net-local

  empowerx-fsds-db-admin-local:
    image: adminer:latest
    container_name: empowerx-fsds-db-admin-local
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      empowerx-fsds-db-local:
        condition: service_healthy
    networks:
      - empowerx-net-local

volumes:
  empowerx-fsds-db-data-local:
    name: empowerx-fsds-db-data-local
    external: true

networks:
  empowerx-net-local:
    name: empowerx-net-local
    external: true
