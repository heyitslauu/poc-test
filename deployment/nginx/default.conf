server {
    listen 80;
    # listen [::]:80;
    server_name dev-fsds-api.dswd5.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    # Listen on HTTPS
    listen 443 ssl;
    # Enable IPv6 for HTTPS
    # listen [::]:443 ssl ipv6only=on;
    server_name dev-fsds-api.dswd5.com;

    ssl_certificate /etc/nginx/ssl/dswd5.com/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/dswd5.com/privkey.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    error_log /var/log/nginx/fsds-api-error.log;
    access_log /var/log/nginx/fsds-api-access.log;

    location / {
        proxy_pass http://empowerx-fsds-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 900s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://empowerx-fsds-api:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Optional security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
}